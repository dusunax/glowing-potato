<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="beachBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#85c3ff"/>
      <stop offset="49%" stop-color="#8dc8ff"/>
      <stop offset="50%" stop-color="#cfa45f"/>
      <stop offset="100%" stop-color="#e2c38f"/>
    </linearGradient>
    <linearGradient id="shoreTint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6fcef9" stop-opacity="0.26"/>
      <stop offset="40%" stop-color="#e4d0a5" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#efe0b8" stop-opacity="0.36"/>
    </linearGradient>
    <pattern id="beachDunes" width="16" height="16" patternUnits="userSpaceOnUse">
      <path d="M0 12 C4.5 8.5 11.2 8.5 16 12.2" stroke="#ead0a5" stroke-opacity="0.5" stroke-width="2" fill="none"/>
      <path d="M-1 16 C5 12 11.2 12 17 15.8" stroke="#f7ddb8" stroke-opacity="0.42" stroke-width="1.5" fill="none"/>
      <path d="M-2 8.5 C4 5.2 12 5.2 18 8.9" stroke="#d7b17d" stroke-opacity="0.36" stroke-width="1" fill="none"/>
    </pattern>
    <pattern id="shells" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="4.5" cy="13.8" r="1" fill="#d6b784" fill-opacity="0.45"/>
      <circle cx="15.5" cy="10.8" r="0.9" fill="#be9668" fill-opacity="0.38"/>
      <path d="M3 4.5 C4.4 4 5.8 5 7 4.2 C8.2 3.4 8.8 2 10.3 2.1" stroke="#d5b27d" stroke-opacity="0.34" stroke-width="0.9" fill="none"/>
    </pattern>
    <linearGradient id="waterEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9fd3ff" stop-opacity="0.08"/>
      <stop offset="85%" stop-color="#6fb0f2" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#6fa6e8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shoreBand" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f7dd8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2f7dd8" stop-opacity="0.24"/>
    </linearGradient>
    <linearGradient id="surfWave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9edff" stop-opacity="0"/>
      <stop offset="30%" stop-color="#d9edff" stop-opacity="0.18"/>
      <stop offset="75%" stop-color="#a8d4ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#79b8f5" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" fill="url(#beachBase)"/>
  <rect width="64" height="64" fill="url(#beachDunes)"/>
  <rect width="64" height="64" fill="url(#shells)"/>
  <rect y="0" width="64" height="32" fill="url(#waterEdge)"/>
  <rect y="30" width="64" height="18" fill="url(#shoreTint)"/>
  <rect y="48" width="64" height="16" fill="url(#shoreBand)"/>
  <rect y="0" width="64" height="34" fill="url(#surfWave)"/>
  <line x1="0" y1="31" x2="64" y2="31" stroke="#2b6cc7" stroke-opacity="0.46" stroke-width="1.25" />
  <line x1="0" y1="31.5" x2="64" y2="31.5" stroke="#f5e7ce" stroke-opacity="0.28" stroke-width="0.8" />
  <g fill="#fffbec" opacity="0.42">
    <ellipse cx="8" cy="50" rx="4.8" ry="1.9"/>
    <ellipse cx="24" cy="50.8" rx="6.4" ry="2.2"/>
    <ellipse cx="44.5" cy="50" rx="5" ry="1.9"/>
  </g>
  <g fill="#efe2c0" opacity="0.78">
    <ellipse cx="13.5" cy="58" rx="9" ry="3.9"/>
    <ellipse cx="34" cy="57.2" rx="10.5" ry="4.9"/>
    <ellipse cx="54.5" cy="58" rx="7.8" ry="3.2"/>
  </g>
</svg>
